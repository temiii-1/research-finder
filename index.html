<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UT Research Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #bf5700;  
        }

        button {
            margin-top: 10px;
            padding: 6px 12px;
            background-color: #bf5700;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #a04800;
        }

        select {
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            margin-right: 10px;
        }

        #search {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            margin-top: 20px;
            box-sizing: border-box;
        }

        #category-filter {
            max-width: 150px;
        }

        .study-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #bf5700;
        }

        .study-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .study-compensation {
            color: green;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .study-date {
            color: gray;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .study-description {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <h1>UT Research Finder</h1>
    <p>Find research studies at UT Austin that match your interests.</p>
    <p>Are you a researcher? <a href="submit.html" style="color: #bf5700;">Submit your study here</a></p>

    <select id="compensation-filter">
        <option value="all">All Studies</option>
        <option value="paid">Paid Only</option>
        <option value="unpaid">Unpaid Only</option>
    </select>

    <select id="age-filter">
        <option value = "all">All Ages</option>
        <option value="18">18+</option>
        <option value="21">21+</option>
    </select>

    
    
    
    <select id="category-filter">
        <option value="all">All Categories</option>
        <!---
        <option value="Bipolar Disorder">Bipolar Disorder</option>
        <option value="Generalized Anxiety Disorder">Generalized Anxiety Disorder</option>
        <option value="Healthy Adult – 18-70 Years Old">Healthy Adult</option>
        <option value="Major Depression / Treatment Resistant Depression">Major Depression</option>
        <option value="Obsessive-Compulsive Disorder">OCD</option>
        <option value="Panic Disorder">Panic Disorder</option>
        <option value="Postpartum Depression">Postpartum Depression</option>
        <option value="Pregnancy">Pregnancy</option>
        <option value="PTSD/Trauma">PTSD/Trauma</option>
        <option value="Self-Injurious Thoughts or Behaviors">Self-Injury</option>
        <option value="Social Anxiety Disorder">Social Anxiety</option>
        -->
    </select>

    <select id="sort-filter">
        <option value = "newest">Descending</option>
        <option value="oldest">Ascending</option>
    </select>

    <input type="text" id="search" placeholder="Search studies...">


    <p id="study-count"></p>
    <div id="studies-container"></div>

    <script>
        // Fetch studies from Flask API
        async function loadStudies() {
            const response = await fetch("https://research-finder-production.up.railway.app/studies");
            allStudies = await response.json();
            populateCategoryFilter(allStudies);
            displayStudies(sortStudies(filterStudies(allStudies)));
        }

        // Filter studies based on compensation & age
        function filterStudies(studies) {
            const query = document.getElementById("search").value.toLowerCase();
            const compensation = document.getElementById("compensation-filter").value;
            const age = document.getElementById("age-filter").value; 
            const category = document.getElementById("category-filter").value;

            return studies.filter(study => {
                const matchesSearch = study.title.toLowerCase().includes(query) ||
                    study.description.toLowerCase().includes(query);

                const matchesCompensation = compensation === "all" ||
                    (compensation === "paid" && study.compensation) ||
                    (compensation === "unpaid" && !study.compensation);
                

                const eligibilityText = study.eligibility.join(" ").toLowerCase(); 
                const matchesAge = age === "all" ||
                    (age === "18" && (eligibilityText.includes("18") || eligibilityText.includes("adults"))) ||
                    (age === "21" && eligibilityText.includes("21"));
                
                const matchesCategory = category === "all" || study.category === category;

                return matchesSearch && matchesCompensation && matchesAge && matchesCategory;
            });
        }

        // Dynamically populate category filter
        function populateCategoryFilter(studies) {
            const select = document.getElementById("category-filter");
            const categories = [...new Set(studies.map(study => study.category))].sort();
            
            categories.forEach(category => {
                const option = document.createElement("option");
                option.value = category;
                option.textContent = category;
                select.appendChild(option);
            });
        }


        function sortStudies(studies) {
            const sort = document.getElementById("sort-filter").value;
            return [...studies].sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                return sort === "newest" ? dateB - dateA : dateA - dateB;
            });
        }

        

        function displayStudies(studies) {
            const container = document.getElementById("studies-container");
            container.innerHTML = "";

            document.getElementById("study-count").textContent = `Showing ${studies.length} ${studies.length === 1 ? "study" : "studies"}`;


            if(studies.length === 0) {
                container.innerHTML = "<p>No studies found.</p>";
                return; 
            }

            studies.forEach(study => {
                const card = document.createElement("div");
                card.className = "study-card";
                card.innerHTML = `
                    <div class="study-title">${study.title}</div>
                    <div class="study-category" style="color: #bf5700; font-size: 14px; margin-bottom: 6px;">${study.category}</div>
                    <div class="study-date">Posted: ${study.date}</div>
                    <div class="study-compensation">${study.compensation || "Compensation not listed"}</div>
                    <div class="study-preview" id="preview-${study.id}">
                        <div class="study-description">${study.description.replace("Description (purpose of the study):", "").substring(0, 200)}...</div>

                    </div>
                    <div class="study-details" id="details-${study.id}" style="display:none;">
                        <hr>
                        <p>${study.description.replace("Description (purpose of the study):", "").trim()}</p>
                        <p><strong>Eligibility:</strong></p>
                        <ul>
                            ${study.eligibility.map(item => {
                                if (item.startsWith("**")) {
                                    return `<li style="list-style:none; font-weight:bold; margin-top:8px;">${item.replace(/\*\*/g, "")}</li>`;
                                }
                                return `<li style="margin-left:20px;">${item.trim()}</li>`;
                            }).join("")}
                        </ul>
                        <p><strong>Contact:</strong> ${study.contact.replace("Contact:", "").trim() || "No contact info listed"}</p>
                    </div>
                    <button onclick="toggleDetails(${study.id})" id="btn-${study.id}">Show More</button>
                `;
                container.appendChild(card);
            });
        }

        function toggleDetails(id) {
            const details = document.getElementById(`details-${id}`);
            const preview = document.getElementById(`preview-${id}`); 
            const btn = document.getElementById(`btn-${id}`);
            if (details.style.display === "none") {
                details.style.display = "block";
                preview.style.display = "none";
                btn.textContent = "Show Less";
            } else {
                details.style.display = "none";
                preview.style.display = "block";
                btn.textContent = "Show More";
            }
        }

        document.getElementById("search").addEventListener("input", function() {
            displayStudies(sortStudies(filterStudies(allStudies))); 
        });

        document.getElementById("compensation-filter").addEventListener("change", function() {
            displayStudies(sortStudies(filterStudies(allStudies)));
        });

        document.getElementById("age-filter").addEventListener("change", function() {
            displayStudies(sortStudies(filterStudies(allStudies)));
        });

        document.getElementById("sort-filter").addEventListener("change", function() {
            displayStudies(sortStudies(filterStudies(allStudies)));
        });

        document.getElementById("category-filter").addEventListener("change", function() {
            displayStudies(sortStudies(filterStudies(allStudies)));
        });

        loadStudies();
    </script>

</body>
</html>
