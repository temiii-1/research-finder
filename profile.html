<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | UT Research Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1, h2 { color: #bf5700; }

        a { color: #bf5700; }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #bf5700;
            margin-bottom: 20px;
        }

        .profile-field {
            margin-bottom: 12px;
        }

        .profile-field label {
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

        .profile-field p {
            margin: 4px 0 0 0;
            font-size: 16px;
        }

        .tag {
            display: inline-block;
            background-color: #fff0e6;
            color: #bf5700;
            border: 1px solid #bf5700;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            margin: 3px;
        }

        button {
            background-color: #bf5700;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover { background-color: #a04800; }

        .study-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #bf5700;
        }

        .study-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .study-category {
            color: #bf5700;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .study-compensation {
            color: green;
            font-weight: bold;
            font-size: 13px;
        }

        .placeholder {
            color: #999;
            font-style: italic;
            padding: 20px;
            text-align: center;
            background: white;
            border-radius: 8px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="index.html">← Back to studies</a>
        <div>
            <span id="user-email" style="margin-right: 15px; color: #555;"></span>
            <a href="#" onclick="logout()">Log out</a>
        </div>
    </div>

    <h1>My Profile</h1>

    <!-- Profile Info Section -->
    <div class="profile-card">
        <div class="section-header">
            <h2 style="margin: 0;">Profile Info</h2>
            <button onclick="window.location.href='profile_setup.html'">Edit Profile</button>
        </div>

        <div class="profile-field">
            <label>Email</label>
            <p id="profile-email">—</p>
        </div>

        <div class="profile-field">
            <label>Age</label>
            <p id="profile-age">—</p>
        </div>

        <div class="profile-field">
            <label>Major</label>
            <p id="profile-major">—</p>
        </div>

        <div class="profile-field">
            <label>Availability</label>
            <p id="profile-availability">—</p>
        </div>

        <div class="profile-field">
            <label>Research Interests</label>
            <div id="profile-interests"></div>
        </div>
    </div>

    <!-- Recommendations Section -->
    <div class="section-header">
        <h2 style="margin: 0;">Recommended Studies</h2>
    </div>
    <div class="placeholder" id="recommendations-placeholder">
        AI-powered recommendations coming soon. Complete your profile to get matched with studies.
    </div>
    <div id="recommendations-container"></div>

    <!-- Bookmarks Section -->
    <div class="section-header" style="margin-top: 30px;">
        <h2 style="margin: 0;">Bookmarked Studies</h2>
    </div>
    <div class="placeholder" id="bookmarks-placeholder">
        You haven't bookmarked any studies yet. Browse studies and click the bookmark icon to save them here.
    </div>
    <div id="bookmarks-container"></div>

    <script>
        const API = "https://research-finder-fze4.onrender.com";
        const token = localStorage.getItem("token");
        const email = localStorage.getItem("email");

        if (!token) {
            window.location.href = "login.html";
        }

        document.getElementById("user-email").textContent = email;
        document.getElementById("profile-email").textContent = email;

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("email");
            window.location.href = "index.html";
        }

        async function loadProfile() {
            const response = await fetch(`${API}/profile`, {
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (!response.ok) {
                return;
            }

            const profile = await response.json();

            document.getElementById("profile-age").textContent = profile.age || "—";
            document.getElementById("profile-major").textContent = profile.major || "—";
            document.getElementById("profile-availability").textContent = profile.availability || "—";

            // Display interests as tags
            const interestsContainer = document.getElementById("profile-interests");
            if (profile.interests) {
                const interests = profile.interests.split(", ");
                interests.forEach(interest => {
                    const tag = document.createElement("span");
                    tag.className = "tag";
                    tag.textContent = interest;
                    interestsContainer.appendChild(tag);
                });
            } else {
                interestsContainer.textContent = "—";
            }
        }

        loadProfile();
    </script>

</body>
</html>
