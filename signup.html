<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | UT Research Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #bf5700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #bf5700;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #a04800;
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
        }

        .success { color: green; }
        .error { color: red; }

        a { color: #bf5700; }

        .links {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Create Account</h1>
    <p>Sign up to get personalized study recommendations.</p>

    <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="your@email.com">
    </div>

    <div class="form-group">
        <label>Password *</label>
        <input type="password" id="password" placeholder="At least 8 characters">
    </div>

    <div class="form-group">
        <label>Confirm Password *</label>
        <input type="password" id="confirm-password" placeholder="Repeat your password">
    </div>

    <button onclick="signup()">Create Account</button>

    <p id="message"></p>

    <div class="links">
        <p>Already have an account? <a href="login.html">Log in</a></p>
        <p><a href="index.html">← Back to study listings</a></p>
    </div>

    <script>
        const API = "http://127.0.0.1:5000";

        async function signup() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirm-password").value;
            const message = document.getElementById("message");

            if (!email || !password || !confirm) {
                message.textContent = "Please fill in all fields";
                message.className = "error";
                return;
            }

            if (password.length < 8) {
                message.textContent = "Password must be at least 8 characters";
                message.className = "error";
                return;
            }

            if (password !== confirm) {
                message.textContent = "Passwords do not match";
                message.className = "error";
                return;
            }

            const response = await fetch(`${API}/signup`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem("token", result.token);
                localStorage.setItem("email", email);
                console.log("Signup successful, redirecting...");
                message.textContent = "Account created! Redirecting to setup...";
                message.className = "success";
                setTimeout(() => window.location.href = "profile_setup.html", 2000);
            } else {
                message.textContent = result.error;
                message.className = "error";
            }
        }
    </script>

</body>
</html>
