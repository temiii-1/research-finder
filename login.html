<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Study Participant Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 { color: #bf5700; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #bf5700;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        button:hover { background-color: #a04800; }

        #message {
            margin-top: 20px;
            font-weight: bold;
        }

        .success { color: green; }
        .error { color: red; }
        a { color: #bf5700; }

        .links {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Log In</h1>
    <p>Log in to get personalized study recommendations.</p>

    <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="your@email.com">
    </div>

    <div class="form-group">
        <label>Password *</label>
        <input type="password" id="password" placeholder="Your password">
    </div>

    <button onclick="login()">Log In</button>

    <p id="message"></p>

    <div class="links">
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        <p><a href="index.html">← Back to study listings</a></p>
    </div>

    <script>
        const API = "https://study-participant-hub.onrender.com";

        async function login() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const message = document.getElementById("message");

            if (!email || !password) {
                message.textContent = "Please fill in all fields";
                message.className = "error";
                return;
            }

            const response = await fetch(`${API}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok) {
                // Save token to localStorage so we stay logged in
                localStorage.setItem("token", result.token);
                localStorage.setItem("email", email);
                message.textContent = "Login successful! Redirecting...";
                message.className = "success";
                setTimeout(() => window.location.href = "index.html", 2000);
            } else {
                message.textContent = result.error;
                message.className = "error";
            }
        }
    </script>

</body>
</html>
