<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Study Participant Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 { color: #bf5700; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea { height: 100px; resize: vertical; }

        button {
            background-color: #bf5700;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }

        button:hover { background-color: #a04800; }

        #message {
            margin-top: 20px;
            font-weight: bold;
        }

        .success { color: green; }
        .error { color: red; }
        a { color: #bf5700; }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .user-info {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #bf5700;
        }
    </style>
</head>
<body>

    <h1>My Profile</h1>
    <div class="user-info">
        <p>Logged in as: <strong id="user-email"></strong></p>
        <a href="#" onclick="logout()">Log out</a>
    </div>

    <p>Fill out your profile to get AI-powered (WIP) study recommendations tailored to you.</p>

    <div class="form-group">
        <label>Age</label>
        <input type="number" id="age" placeholder="e.g. 21">
    </div>

    <div class="form-group">
        <label>Major</label>
        <input type="text" id="major" placeholder="e.g. Psychology, Neuroscience">
    </div>


    <div class="form-group">
        <label>Research Categories You're Interested In</label>
        <div id="category-checkboxes" style="background: white; border: 1px solid #ccc; border-radius: 4px; padding: 10px; max-height: 200px; overflow-y: auto;">
        </div>
    </div>

    

    <div class="form-group">
        <label>Availability</label>
        <select id="availability">
            <option value="">Select availability...</option>
            <option value="weekdays">Weekdays</option>
            <option value="weekends">Weekends</option>
            <option value="evenings">Evenings</option>
            <option value="flexible">Flexible</option>
        </select>
    </div>

    

    <button onclick="saveProfile()">Save Profile & Get Recommendations</button>

    <p id="message"></p>

    <div class="links">
        <p><a href="index.html">← Back to study listings</a></p>
    </div>

    <script>
        const API = "https://study-participant-hub.onrender.com";

        // Check if user is logged in
        const token = localStorage.getItem("token");
        const email = localStorage.getItem("email");

        if (!token) {
            window.location.href = "login.html";
        }

        document.getElementById("user-email").textContent = email;

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("email");
            window.location.href = "index.html";
        }

        async function loadCategories() {
            const response = await fetch(`${API}/categories`);
            const categories = await response.json();
            
            const container = document.getElementById("category-checkboxes");
            
            categories.forEach(category => {
                const div = document.createElement("div");
                div.style.padding = "6px 0";
                div.innerHTML = `
                    <label style="font-weight: normal; cursor: pointer;">
                        <input type="checkbox" value="${category}" style="width: auto; margin-right: 8px;">
                        ${category}
                    </label>
                `;
                container.appendChild(div);
            });
        }

        async function saveProfile() {
            const message = document.getElementById("message");
            const checkboxes = document.querySelectorAll("#category-checkboxes input:checked");
            const interests = Array.from(checkboxes).map(cb => cb.value).join(", ");

            const profile = {
                age: document.getElementById("age").value,
                major: document.getElementById("major").value,
                interests: interests,
                availability: document.getElementById("availability").value,
                medical_conditions: ""
            };

            const response = await fetch(`${API}/profile`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(profile)
            });

            const result = await response.json();

            if (response.ok) {
                message.textContent = "Profile saved! Redirecting to home page...";
                message.className = "success";
                setTimeout(() => window.location.href = "index.html", 2000);
            } else {
                message.textContent = result.error;
                message.className = "error";
            }
        }

        loadCategories();
    </script>

</body>
</html>
