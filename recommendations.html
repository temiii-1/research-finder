<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recommendations | Study Participant Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 { color: #bf5700; }

        .study-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #bf5700;
        }

        .study-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .study-category {
            color: #bf5700;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .study-compensation {
            color: green;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .match-reason {
            background-color: #fff8f0;
            border-left: 3px solid #bf5700;
            padding: 10px;
            margin-top: 10px;
            font-style: italic;
            color: #555;
        }

        button {
            background-color: #bf5700;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover { background-color: #a04800; }

        #loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }

        .user-info {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #bf5700;
        }

        a { color: #bf5700; }

        .links { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>My Study Recommendations</h1>

    <div class="user-info">
        <p>Logged in as: <strong id="user-email"></strong></p>
        <a href="profile.html">Edit Profile</a> |
        <a href="#" onclick="logout()">Log out</a>
    </div>

    <div id="loading">Finding studies that match your profile...</div>
    <div id="recommendations-container"></div>

    <div class="links">
        <p><a href="index.html">← Back to all studies</a></p>
    </div>

    <script>
        const API = "http://127.0.0.1:5000";

        const token = localStorage.getItem("token");
        const email = localStorage.getItem("email");

        if (!token) {
            window.location.href = "login.html";
        }

        document.getElementById("user-email").textContent = email;

        function logout() {
            localStorage.removeItem("token");
            localStorage.removeItem("email");
            window.location.href = "index.html";
        }

        async function loadRecommendations() {
            const response = await fetch(`${API}/recommendations`, {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            const result = await response.json();
            document.getElementById("loading").style.display = "none";

            if (!response.ok) {
                document.getElementById("recommendations-container").innerHTML =
                    `<p style="color:red">${result.error}</p>`;
                return;
            }

            const container = document.getElementById("recommendations-container");

            if (result.recommendations.length === 0) {
                container.innerHTML = "<p>No recommendations found. Try updating your profile.</p>";
                return;
            }

            result.recommendations.forEach(rec => {
                const card = document.createElement("div");
                card.className = "study-card";
                card.innerHTML = `
                    <div class="study-title">${rec.title}</div>
                    <div class="study-category">${rec.category}</div>
                    <div class="study-compensation">${rec.compensation || "Compensation not listed"}</div>
                    <div class="match-reason">💡 ${rec.reason}</div>
                    <p>${rec.description.replace("Description (purpose of the study):", "").substring(0, 200)}...</p>
                    <p><strong>Contact:</strong> ${rec.contact || "No contact info listed"}</p>
                `;
                container.appendChild(card);
            });
        }

        loadRecommendations();
    </script>

</body>
</html>
